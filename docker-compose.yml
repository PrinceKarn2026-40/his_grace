services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hisgrace_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-hisgrace}
      - DB_USERNAME=${DB_USERNAME:-hisgrace_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - hisgrace_network

  nginx:
    image: nginx:alpine
    container_name: hisgrace_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hisgrace_network

  db:
    image: mysql:8.0
    container_name: hisgrace_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-hisgrace}
      MYSQL_USER: ${DB_USERNAME:-hisgrace_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - hisgrace_db_data:/var/lib/mysql
    networks:
      - hisgrace_network

networks:
  hisgrace_network:
    driver: bridge

volumes:
  hisgrace_db_data:
