services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hisgrace_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    environment:
      APP_NAME: HisGrace
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      ASSET_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: hisgrace
      DB_USERNAME: hisgrace_user
      DB_PASSWORD: secret
      FILESYSTEM_DISK: public
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      CACHE_STORE: ${CACHE_STORE:-file}
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hisgrace_network
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: hisgrace_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - hisgrace_network

  db:
    image: mysql:8.0
    container_name: hisgrace_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hisgrace
      MYSQL_USER: hisgrace_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - hisgrace_db_data:/var/lib/mysql
    networks:
      - hisgrace_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

networks:
  hisgrace_network:
    driver: bridge

volumes:
  hisgrace_db_data:
