name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hisgrace_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, zip, gd, bcmath, exif, pcntl
          coverage: none

      - name: Copy .env
        run: cp .env.example .env

      - name: Configure test environment
        run: |
          sed -i 's|APP_URL=.*|APP_URL=http://localhost|' .env
          sed -i 's|ASSET_URL=.*|ASSET_URL=http://localhost|' .env
          sed -i 's|DB_CONNECTION=.*|DB_CONNECTION=mysql|' .env
          sed -i 's|DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|DB_PORT=.*|DB_PORT=3306|' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=hisgrace_test|' .env
          sed -i 's|DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=root|' .env
          sed -i 's|SESSION_DRIVER=.*|SESSION_DRIVER=array|' .env
          sed -i 's|CACHE_STORE=.*|CACHE_STORE=array|' .env
          sed -i 's|QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|' .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate application key
        run: php artisan key:generate

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies & build assets
        run: npm ci && npm run build

      - name: Run PHPUnit tests
        run: php artisan test

  # ── Job 2: Docker Build & Smoke Test ────────────────────────────────────
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hisgrace:latest .

      - name: List built images
        run: docker images hisgrace

      - name: Prepare .env for Docker stack
        run: |
          cp .env.example .env
          APP_KEY="base64:$(openssl rand -base64 32)"
          sed -i "s|APP_KEY=.*|APP_KEY=${APP_KEY}|" .env
          sed -i 's|APP_URL=.*|APP_URL=http://localhost:8080|' .env
          sed -i 's|ASSET_URL=.*|ASSET_URL=http://localhost:8080|' .env
          sed -i 's|APP_ENV=.*|APP_ENV=local|' .env
          sed -i 's|APP_DEBUG=.*|APP_DEBUG=true|' .env
          sed -i 's|SESSION_DRIVER=.*|SESSION_DRIVER=file|' .env
          sed -i 's|CACHE_STORE=.*|CACHE_STORE=file|' .env
          sed -i 's|QUEUE_CONNECTION=.*|QUEUE_CONNECTION=sync|' .env
          echo "DB_ROOT_PASSWORD=rootsecret" >> .env

      - name: Start full stack with docker-compose
        run: |
          docker compose up -d
          echo "Waiting for containers to be ready..."
          sleep 40

      - name: Check running containers
        run: docker compose ps

      - name: Smoke test — HTTP 200 or 302 from nginx
        run: |
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
              echo "✅ Application is responding"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Application did not respond in time"
          docker compose logs app
          docker compose logs nginx
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
